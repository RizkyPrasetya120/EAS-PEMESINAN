<!DOCTYPE html>
<html lang="id">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Sistem Prediksi Risiko Transaksi Keuangan</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            background:linear-gradient(135deg,#0ea5e9,#2563eb);
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            padding:30px;
        }

        .container{
            width:100%;
            max-width:800px;
            background:#ffffff;
            border-radius:15px;
            padding:40px;
            box-shadow:0 10px 30px rgba(0,0,0,.2);
        }

        h1{
            text-align:center;
            color:#1e3a8a;
            margin-bottom:10px;
        }

        h3{
            text-align:center;
            color:#666;
            margin-bottom:30px;
            font-weight:normal;
        }

        label{
            display:block;
            margin-top:15px;
            margin-bottom:6px;
            font-weight:bold;
        }

        input{
            width:100%;
            padding:12px;
            border:1px solid #ccc;
            border-radius:8px;
            font-size:15px;
        }

        input:focus{
            outline:none;
            border-color:#2563eb;
            box-shadow:0 0 5px rgba(37,99,235,.4);
        }

        button{
            width:100%;
            margin-top:30px;
            padding:14px;
            border:none;
            border-radius:8px;
            background:#2563eb;
            color:white;
            font-size:18px;
            cursor:pointer;
            transition:.3s;
        }

        button:hover{
            background:#1d4ed8;
        }

        .result{
            margin-top:30px;
            padding:20px;
            border-radius:10px;
            background:#f8fafc;
            text-align:center;
            border:1px solid #ddd;
        }

        .result h2{
            color:#1e3a8a;
            margin-bottom:10px;
        }

        .result p{
            font-size:24px;
            font-weight:bold;
        }

    </style>

</head>

<body>

<div class="container">

    <h1>Sistem Prediksi Risiko Transaksi Keuangan</h1>

    <h3>Menggunakan Algoritma Random Forest</h3>

    <form action="/predict" method="POST">

        <label for="Amount">Amount</label>
        <input
            id="Amount"
            type="number"
            name="Amount"
            placeholder="Contoh: 1500"
            value="{{ Amount }}"
            required
        >

        <label for="V1">V1</label>
        <input
            id="V1"
            type="number"
            step="any"
            name="V1"
            placeholder="Contoh: -0.25"
            value="{{ V1 }}"
            required
        >

        <label for="V2">V2</label>
        <input
            id="V2"
            type="number"
            step="any"
            name="V2"
            placeholder="Contoh: 0.56"
            value="{{ V2 }}"
            required
        >

        <label for="V3">V3</label>
        <input
            id="V3"
            type="number"
            step="any"
            name="V3"
            placeholder="Contoh: -1.12"
            value="{{ V3 }}"
            required
        >

        <label for="V4">V4</label>
        <input
            id="V4"
            type="number"
            step="any"
            name="V4"
            placeholder="Contoh: 0.87"
            value="{{ V4 }}"
            required
        >

        <button type="submit">
            Prediksi Risiko
        </button>

    </form>

    {% if prediction_text %}

    <div class="result">

        <h2>Hasil Prediksi</h2>

        <p>{{ prediction_text }}</p>

    </div>

    {% endif %}

</div>

</body>

</html>
